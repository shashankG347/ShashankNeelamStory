<!DOCTYPE html><html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shashank weds Neelam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&amp;family=Marcellus&amp;family=Nunito:wght@200;300;400&amp;family=Dancing+Script:wght@600;700&amp;family=Noto+Sans+Devanagari:wght@400;600&amp;family=Yatra+One&amp;display=swap" rel="stylesheet">

<style>
@charset "utf-8";

*, ::before, ::after { margin: 0px; padding: 0px; box-sizing: border-box; }

:root { --ivory: #fdf8f0; --ivory2: #f8f1e4; --maroon: #7b1a2e; --maroon2: #9e2440; --gold: #c9923a; --gold2: #e8b86d; --gold3: #f5d89a; --teal: #1d6068; --teal2: #2d8a97; --ink: #1e1410; --sand: #e8d8b8; }

html { scroll-behavior: smooth; }

body { background: var(--ivory); color: var(--ink); font-family: Nunito, sans-serif; font-weight: 300; overflow-x: hidden; }

#mandalaCanvas { position: absolute; inset: 0px; width: 100%; height: 100%; opacity: 0.07; pointer-events: none; }

.hero { min-height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; background: var(--ivory); }

.hero::before { content: ""; position: absolute; top: 0px; right: 0px; width: 42%; height: 100%; background: linear-gradient(160deg, var(--maroon) 0%, #4a0f1c 100%); clip-path: polygon(18% 0px, 100% 0px, 100% 100%, 0% 100%); }

.hero::after { content: ""; position: absolute; top: 0px; right: 42%; width: 3px; height: 100%; background: linear-gradient(to bottom, transparent, var(--gold2) 20%, var(--gold2) 80%, transparent); transform: translateX(50%) skewX(-4deg); }

.hero-content { position: relative; z-index: 2; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 0px 40px; width: 100%; max-width: 1000px; padding: 60px 32px; text-align: center; }

.groom-side { text-align: right; animation: 1.2s ease 0.1s 1 normal both running fadeLeft; }

.bride-side { text-align: left; animation: 1.2s ease 0.1s 1 normal both running fadeRight; }

.person-label { font-size: 0.6rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; display: block; }

.bride-side .person-label { color: var(--gold3); }

.person-name { font-family: "Playfair Display", serif; font-style: italic; font-size: clamp(2.6rem, 5.5vw, 5rem); font-weight: 400; line-height: 1; color: var(--ink); }

.bride-side .person-name { color: var(--ivory); }

.person-family { font-size: 0.7rem; letter-spacing: 0.2em; color: rgba(30, 20, 16, 0.85); margin-top: 10px; }

.bride-side .person-family { color: rgba(253, 248, 240, 0.88); }

.center-medallion { display: flex; flex-direction: column; align-items: center; gap: 10px; animation: 1.4s ease 0.3s 1 normal both running scaleIn; }

.medallion-ring { width: 110px; height: 110px; border-radius: 50%; border: 1.5px solid var(--gold2); display: grid; place-items: center; position: relative; }

.medallion-ring::before { content: ""; position: absolute; inset: 6px; border-radius: 50%; border: 1px solid rgba(201, 146, 58, 0.3); }

.om-symbol { font-size: 2.2rem; color: var(--gold2); line-height: 1; }

.weds-text { font-family: Marcellus, serif; font-size: 0.65rem; letter-spacing: 0.5em; text-transform: uppercase; color: var(--gold); }

.hero-date-bar { position: absolute; bottom: 0px; left: 0px; right: 0px; background: var(--maroon); padding: 18px 32px; display: flex; justify-content: center; align-items: center; gap: 48px; z-index: 2; animation: 1s ease 0.7s 1 normal both running fadeUp; }

.hero-date-bar .item { text-align: center; }

.hero-date-bar .item-label { font-size: 0.55rem; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(232, 184, 109, 0.6); margin-bottom: 3px; }

.hero-date-bar .item-val { font-family: Marcellus, serif; font-size: 0.9rem; letter-spacing: 0.15em; color: var(--gold3); }

.bar-divider { width: 1px; height: 32px; background: rgba(201, 146, 58, 0.25); }

nav { position: sticky; top: 0px; z-index: 200; background: var(--maroon); padding: 0px 24px; }

nav ul { list-style: none; display: flex; justify-content: center; gap: 40px; padding: 16px 0px; }

nav a { text-decoration: none; font-size: 0.62rem; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(232, 184, 109, 0.65); transition: color 0.3s; }

nav a:hover { color: var(--gold3); }

.sec { padding: 90px 24px; }

.sec-inner { max-width: 860px; margin: 0px auto; }

.sec-badge { display: inline-flex; align-items: center; gap: 12px; margin-bottom: 20px; }

.sec-badge::before, .sec-badge::after { content: ""; width: 36px; height: 1px; background: var(--gold); }

.sec-badge span { font-size: 0.6rem; letter-spacing: 0.45em; text-transform: uppercase; color: var(--gold); }

.sec-title { font-family: "Playfair Display", serif; font-size: clamp(2.2rem, 4.5vw, 3.5rem); font-weight: 400; line-height: 1.15; color: var(--ink); margin-bottom: 48px; }

.sec-title em { font-style: italic; color: var(--maroon); }

#events { background: var(--ivory2); }

.events-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 2px; }

.event-card { background: var(--ivory); padding: 40px 32px; border-top: 3px solid var(--gold); position: relative; overflow: hidden; transition: transform 0.35s, box-shadow 0.35s; }

.event-card::after { content: attr(data-num); position: absolute; bottom: -16px; right: 16px; font-family: "Playfair Display", serif; font-size: 5rem; font-style: italic; color: rgba(201, 146, 58, 0.06); line-height: 1; pointer-events: none; }

.event-card:nth-child(2) { border-top-color: var(--maroon); }

.event-card:nth-child(3) { border-top-color: var(--teal); }

.event-card:nth-child(4) { border-top-color: var(--gold2); }

.event-card:hover { transform: translateY(-6px); box-shadow: rgba(123, 26, 46, 0.1) 0px 20px 60px; }

.event-icon { font-size: 1.6rem; margin-bottom: 16px; display: block; }

.event-name { font-family: "Playfair Display", serif; font-size: 1.3rem; font-weight: 400; color: var(--ink); margin-bottom: 6px; }

.event-hindi { font-size: 0.75rem; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 16px; font-family: Marcellus, serif; }

.event-meta { font-size: 0.75rem; color: rgba(30, 20, 16, 0.5); line-height: 1.7; }

.event-meta strong { color: var(--maroon); font-weight: 400; }

#story .story-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: start; }

.story-timeline { position: relative; padding-left: 32px; }

.story-timeline::before { content: ""; position: absolute; left: 0px; top: 0px; bottom: 0px; width: 1px; background: linear-gradient(to bottom, var(--gold), var(--maroon), var(--teal)); }

.st-item { margin-bottom: 40px; position: relative; }

.st-dot { position: absolute; left: -38px; top: 4px; width: 12px; height: 12px; border-radius: 50%; border: 2px solid var(--gold); background: var(--ivory); }

.st-year { font-size: 0.58rem; letter-spacing: 0.4em; color: var(--gold); text-transform: uppercase; margin-bottom: 4px; }

.st-head { font-family: "Playfair Display", serif; font-size: 1.15rem; font-style: italic; color: var(--maroon); margin-bottom: 6px; }

.st-body { font-size: 0.85rem; line-height: 1.8; color: rgba(30, 20, 16, 0.6); }

.story-visual { display: flex; flex-direction: column; gap: 16px; }

.photo-placeholder { border-radius: 2px; overflow: hidden; position: relative; background: linear-gradient(135deg, var(--sand) 0%, var(--blush, #e8c4b0) 100%); }

.photo-placeholder.tall { aspect-ratio: 3 / 4; background: linear-gradient(135deg, var(--maroon) 0%, #9e2440 100%); }

.photo-placeholder.wide { aspect-ratio: 16 / 9; background: linear-gradient(135deg, var(--teal) 0%, #1d6068 100%); }

.photo-placeholder .ph-inner { position: absolute; inset: 0px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: rgba(255, 255, 255, 0.4); font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; }

#venue { background: var(--maroon); }

#venue .sec-title { color: var(--ivory); }

#venue .sec-title em { color: var(--gold3); }

#venue .sec-badge span { color: var(--gold2); }

#venue .sec-badge::before, #venue .sec-badge::after { background: var(--gold2); }

.venue-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 32px; align-items: start; }

.venue-card { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(201, 146, 58, 0.2); padding: 36px 32px; border-radius: 1px; }

.venue-map { max-width: 480px; margin: 28px auto 0; height: 260px; border-radius: 4px; overflow: hidden; border: 1px solid rgba(201, 146, 58, 0.25); box-shadow: 0 14px 40px rgba(0,0,0,0.25); }

.venue-card-title { font-family: "Playfair Display", serif; font-size: 1.3rem; color: var(--gold3); margin-bottom: 16px; font-style: italic; }

.venue-detail { display: flex; gap: 14px; margin-bottom: 16px; align-items: flex-start; }

.venue-detail .vd-icon { font-size: 1rem; flex-shrink: 0; margin-top: 2px; }

.venue-detail .vd-text { font-size: 0.82rem; color: rgba(253, 248, 240, 0.65); line-height: 1.7; }

.venue-detail .vd-text strong { display: block; color: var(--gold2); font-weight: 400; margin-bottom: 2px; font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; }

#schedule .schedule-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; }

.day-block { }

.day-label { font-family: Marcellus, serif; font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase; color: var(--teal); margin-bottom: 24px; padding-bottom: 12px; border-bottom: 1px solid rgba(29, 96, 104, 0.2); }

.sched-item { display: grid; grid-template-columns: 56px 1fr; gap: 0px 16px; margin-bottom: 24px; }

.sched-time { font-size: 0.7rem; color: var(--gold); letter-spacing: 0.05em; padding-top: 3px; text-align: right; }

.sched-body { }

.sched-event { font-family: "Playfair Display", serif; font-size: 1rem; font-weight: 400; color: var(--ink); margin-bottom: 2px; }

.sched-desc { font-size: 0.75rem; color: rgba(30, 20, 16, 0.5); line-height: 1.6; }

#rsvp { background: linear-gradient(160deg, #0e3a3f 0%, var(--teal) 50%, #0e3a3f 100%); position: relative; overflow: hidden; }

#rsvp::before { content: ""; position: absolute; top: -100px; left: -100px; width: 400px; height: 400px; border-radius: 50%; border: 1px solid rgba(201, 146, 58, 0.1); }

#rsvp::after { content: ""; position: absolute; bottom: -80px; right: -80px; width: 320px; height: 320px; border-radius: 50%; border: 1px solid rgba(201, 146, 58, 0.08); }

#rsvp .sec-title { color: var(--ivory); }

#rsvp .sec-title em { color: var(--gold3); }

#rsvp .sec-badge span { color: var(--gold2); }

#rsvp .sec-badge::before, #rsvp .sec-badge::after { background: var(--gold2); }

.rsvp-form-wrap { max-width: 600px; margin: 0px auto; position: relative; z-index: 1; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

.form-full { grid-column: 1 / -1; }

input, select, textarea { width: 100%; padding: 13px 18px; background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(201, 146, 58, 0.25); color: var(--ivory); font-family: Nunito, sans-serif; font-weight: 300; font-size: 0.85rem; letter-spacing: 0.03em; outline: none; border-radius: 1px; transition: border-color 0.3s, background 0.3s; appearance: none; }

input::placeholder, textarea::placeholder { color: rgba(253, 248, 240, 0.3); }

select option { background: rgb(14, 58, 63); }

input:focus, select:focus, textarea:focus { border-color: var(--gold2); background: rgba(255, 255, 255, 0.1); }

textarea { resize: none; height: 90px; }

.btn-rsvp { width: 100%; margin-top: 12px; padding: 15px; background: var(--gold); border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; color: var(--ivory); font-family: Marcellus, serif; font-size: 0.7rem; letter-spacing: 0.45em; text-transform: uppercase; cursor: pointer; transition: background 0.3s, transform 0.2s; border-radius: 1px; }

.btn-rsvp:hover { background: var(--gold2); transform: translateY(-2px); }

#gallery { background: var(--ivory2); padding: 0px; overflow: hidden; }

.gallery-strip { display: flex; gap: 3px; }

.gallery-cell { flex: 1 1 0%; aspect-ratio: 1 / 1; min-width: 0px; position: relative; overflow: hidden; }

.gallery-cell-inner { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 2rem; transition: transform 0.5s; }

.gallery-cell:hover .gallery-cell-inner { transform: scale(1.06); }

.gc1 { background: linear-gradient(135deg, rgb(123, 26, 46), rgb(74, 15, 28)); }

.gc2 { background: linear-gradient(135deg, rgb(201, 146, 58), rgb(138, 94, 26)); }

.gc3 { background: linear-gradient(135deg, rgb(29, 96, 104), rgb(14, 58, 63)); }

.gc4 { background: linear-gradient(135deg, rgb(232, 216, 184), rgb(201, 146, 58)); }

.gc5 { background: linear-gradient(135deg, rgb(158, 36, 64), rgb(123, 26, 46)); }

.gallery-add-label { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); font-size: 0.55rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255, 255, 255, 0.4); white-space: nowrap; }

footer { background: var(--ink); padding: 64px 24px 40px; text-align: center; }

.footer-om { font-size: 2.4rem; color: var(--gold); margin-bottom: 16px; display: block; opacity: 0.7; }

.footer-names { font-family: "Playfair Display", serif; font-style: italic; font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 400; color: var(--gold3); margin-bottom: 10px; }

.footer-date { font-size: 0.65rem; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(253, 248, 240, 0.25); margin-bottom: 40px; }

.footer-wishes { font-family: Marcellus, serif; font-size: 0.75rem; letter-spacing: 0.2em; color: rgba(253, 248, 240, 0.2); }

.rangoli-border { width: 100%; height: 8px; background: repeating-linear-gradient(
      90deg,
      var(--maroon) 0px, var(--maroon) 16px,
      var(--gold) 16px, var(--gold) 32px,
      var(--teal) 32px, var(--teal) 48px,
      var(--gold) 48px, var(--gold) 64px
    ); opacity: 0.75; }

@keyframes fadeUp { 
  0% { opacity: 0; transform: translateY(28px); }
  100% { opacity: 1; transform: none; }
}

@keyframes fadeLeft { 
  0% { opacity: 0; transform: translateX(-32px); }
  100% { opacity: 1; transform: none; }
}

@keyframes fadeRight { 
  0% { opacity: 0; transform: translateX(32px); }
  100% { opacity: 1; transform: none; }
}

@keyframes scaleIn { 
  0% { opacity: 0; transform: scale(0.85); }
  100% { opacity: 1; transform: scale(1); }
}

@keyframes spin { 
  100% { transform: rotate(360deg); }
}

.reveal { opacity: 0; transform: translateY(22px); transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1), transform 0.9s cubic-bezier(0.16, 1, 0.3, 1); }

.reveal.visible { opacity: 1; transform: none; }

@media (max-width: 680px) {
  .hero-content { grid-template-columns: 1fr; gap: 24px; }
  .groom-side, .bride-side { text-align: center; }
  .hero::before { display: none; }
  .hero::after { display: none; }
  .bride-side .person-name { color: var(--ink); }
  .bride-side .person-label { color: var(--gold); }
  .bride-side .person-family { color: rgba(30, 20, 16, 0.45); }
  .hero-date-bar { flex-wrap: wrap; gap: 16px; }
  .venue-grid, #story .story-wrap, #schedule .schedule-cols { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .gallery-strip { flex-wrap: wrap; }
  .gallery-cell { flex: 0 0 calc(50% - 2px); }
}

/* ══ SCRATCH TO REVEAL ══ */
#mandalaCanvas { animation: spin 220s linear infinite; transform-origin: center center; }

.scratch-wrap { position: relative; width: 320px; max-width: 86vw; aspect-ratio: 2 / 1; margin: 0 auto; border-radius: 6px; overflow: hidden; box-shadow: 0 24px 60px rgba(123,26,46,0.18); }

.scratch-content { position: absolute; inset: 0; background: linear-gradient(135deg, var(--ivory) 0%, var(--ivory2) 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }

.scratch-om { font-size: 1.8rem; color: var(--gold); margin-bottom: 8px; }

.scratch-invited { font-family: "Playfair Display", serif; font-style: italic; font-size: 1.7rem; color: var(--maroon); margin-bottom: 4px; }

.scratch-names { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--ink); opacity: 0.55; margin-bottom: 16px; }

.scratch-divider { width: 36px; height: 1px; background: var(--gold); margin-bottom: 16px; }

.scratch-date { font-family: Marcellus, serif; font-size: 1.2rem; letter-spacing: 0.1em; color: var(--ink); margin-bottom: 4px; }

.scratch-day { font-size: 0.68rem; letter-spacing: 0.1em; color: var(--teal); margin-bottom: 16px; }

.scratch-blessing { font-family: Marcellus, serif; font-size: 0.85rem; color: var(--gold); letter-spacing: 0.15em; }

#scratchCanvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: pointer; transition: opacity 0.7s ease; touch-action: none; display: block; }

.scratch-hint { margin-top: 20px; font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); opacity: 0.7; transition: opacity 0.5s ease; }

.scratch-time { font-family: Marcellus, serif; font-size: 1.4rem; letter-spacing: 0.1em; color: var(--maroon); margin-top: 4px; }

.countdown-title {
  font-family: "Dancing Script", cursive;
  font-weight: 700;
  font-size: clamp(1.8rem, 6vw, 2.6rem);
  color: var(--maroon2);
}
.countdown-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 10px auto 28px;
  max-width: 200px;
}
.countdown-divider span { flex: 1 1 0; height: 1px; background: rgba(201, 146, 58, 0.4); }
.countdown-divider em { font-style: normal; color: var(--gold); font-size: 0.85rem; }
.countdown-grid {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.countdown-box {
  text-align: center;
  min-width: 70px;
  padding: 14px 10px;
  background: linear-gradient(135deg, var(--ivory) 0%, var(--blush, #e8c4b0) 100%);
  border: 1px solid rgba(201, 146, 58, 0.3);
  border-radius: 12px;
  box-shadow: 0 10px 26px rgba(123,26,46,0.1);
}
.countdown-num {
  display: block;
  font-family: "Playfair Display", serif;
  font-weight: 700;
  font-size: clamp(1.5rem, 5vw, 2rem);
  color: var(--maroon);
  line-height: 1;
}
.countdown-unit {
  display: block;
  margin-top: 6px;
  font-size: 0.55rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--maroon2);
  opacity: 0.7;
}
@media (max-width: 420px) {
  .countdown-grid { gap: 8px; }
  .countdown-box { min-width: 60px; padding: 12px 6px; }
}

.confetti-piece { position: fixed; top: -12px; z-index: 999; pointer-events: none; border-radius: 2px; will-change: transform, opacity; animation: confettiFall linear forwards; }

@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0.85; }
}

@media (max-width: 680px) {
  .scratch-wrap { width: 280px; }
}
